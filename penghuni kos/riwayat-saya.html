<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Saya | KOSYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="dashboard">
        <div class="drawer">
            <div class="drawer-header">
                <h3>MENU</h3>
                <p>Navigasi Cepat</p>
            </div>
            <div class="drawer-nav">
                <div class="drawer-item" data-page="beranda.html">
                    <span class="drawer-icon">🏠</span>
                    <span>Beranda</span>
                </div>
                <div class="drawer-item" data-page="laporan-saya.html">
                    <span class="drawer-icon">📋</span>
                    <span>Laporan Saya</span>
                </div>
                <div class="drawer-item" data-page="pesan.html">
                    <span class="drawer-icon">💬</span>
                    <span>Pesan</span>
                </div>
                <div class="drawer-item active" data-page="riwayat-saya.html">
                    <span class="drawer-icon">🕓</span>
                    <span>Riwayat Saya</span>
                </div>
                <div class="drawer-item logout" id="logoutBtn">
                    <span class="drawer-icon">🚪</span>
                    <span>Keluar</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="greeting-card">
                <h1>Riwayat Laporan</h1>
                <div class="nama-user">Nama Penghuni Kos</div>
                <div class="kamar-info">Nomor Kamar (Nama Kos)</div>
            </div>

            <div class="section-title">Laporan Selesai</div>
            
            <div class="empty-state">
                <div class="empty-icon">📜</div>
                <div class="empty-text">Belum ada riwayat laporan</div>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
